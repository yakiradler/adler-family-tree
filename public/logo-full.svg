<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 600" width="480" height="600">
  <!--
    InfiniTree full logo — glyph + wordmark stacked. Used in marketing
    surfaces (Landing hero, Auth header). The glyph mirrors icon-app.svg
    but here on a transparent canvas so it sits over whatever page bg
    it's placed against.
  -->
  <defs>
    <linearGradient id="logoGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3CCB89"/>
      <stop offset="55%" stop-color="#26B5A6"/>
      <stop offset="100%" stop-color="#1A8E96"/>
    </linearGradient>
  </defs>

  <g transform="translate(240 30)" fill="none" stroke="url(#logoGrad)"
     stroke-width="6" stroke-linecap="round" stroke-linejoin="round">

    <!-- Canopy stems -->
    <path d="M0 200 C -4 150, -2 100, 0 60" stroke-width="10"/>
    <path d="M-2 110 C -40 90, -80 80, -110 50
             M-2 110 C -55 100, -95 110, -118 80
             M-2 110 C -30 70, -55 50, -75 25" stroke-width="5"/>
    <path d="M2 110 C 40 90, 80 80, 110 50
             M2 110 C 55 100, 95 110, 118 80
             M2 110 C 30 70, 55 50, 75 25" stroke-width="5"/>
    <path d="M-1 70 C -25 50, -40 30, -50 0
             M1 70 C 25 50, 40 30, 50 0
             M0 50 C -15 25, -10 5, 0 -10
             M0 50 C 15 25, 10 5, 0 -10" stroke-width="4"/>

    <!-- Leaf cluster -->
    <g fill="url(#logoGrad)" stroke="none">
      <ellipse cx="0" cy="-15" rx="9" ry="14"/>
      <ellipse cx="-18" cy="-5" rx="8" ry="12" transform="rotate(-25 -18 -5)"/>
      <ellipse cx="18" cy="-5" rx="8" ry="12" transform="rotate(25 18 -5)"/>
      <ellipse cx="-35" cy="10" rx="8" ry="13" transform="rotate(-30 -35 10)"/>
      <ellipse cx="35" cy="10" rx="8" ry="13" transform="rotate(30 35 10)"/>
      <ellipse cx="-50" cy="25" rx="9" ry="13" transform="rotate(-40 -50 25)"/>
      <ellipse cx="50" cy="25" rx="9" ry="13" transform="rotate(40 50 25)"/>
      <ellipse cx="-70" cy="35" rx="9" ry="13" transform="rotate(-55 -70 35)"/>
      <ellipse cx="70" cy="35" rx="9" ry="13" transform="rotate(55 70 35)"/>
      <ellipse cx="-90" cy="50" rx="9" ry="13" transform="rotate(-65 -90 50)"/>
      <ellipse cx="90" cy="50" rx="9" ry="13" transform="rotate(65 90 50)"/>
      <ellipse cx="-110" cy="55" rx="8" ry="12" transform="rotate(-70 -110 55)"/>
      <ellipse cx="110" cy="55" rx="8" ry="12" transform="rotate(70 110 55)"/>
      <ellipse cx="-120" cy="78" rx="8" ry="12" transform="rotate(-80 -120 78)"/>
      <ellipse cx="120" cy="78" rx="8" ry="12" transform="rotate(80 120 78)"/>
      <ellipse cx="-10" cy="40" rx="7" ry="11" transform="rotate(-15 -10 40)"/>
      <ellipse cx="10" cy="40" rx="7" ry="11" transform="rotate(15 10 40)"/>
      <ellipse cx="-25" cy="55" rx="7" ry="11" transform="rotate(-25 -25 55)"/>
      <ellipse cx="25" cy="55" rx="7" ry="11" transform="rotate(25 25 55)"/>
      <ellipse cx="-45" cy="70" rx="7" ry="11" transform="rotate(-40 -45 70)"/>
      <ellipse cx="45" cy="70" rx="7" ry="11" transform="rotate(40 45 70)"/>
      <ellipse cx="-65" cy="80" rx="7" ry="11" transform="rotate(-55 -65 80)"/>
      <ellipse cx="65" cy="80" rx="7" ry="11" transform="rotate(55 65 80)"/>
      <ellipse cx="-15" cy="90" rx="7" ry="11" transform="rotate(-10 -15 90)"/>
      <ellipse cx="15" cy="90" rx="7" ry="11" transform="rotate(10 15 90)"/>
      <ellipse cx="-35" cy="105" rx="7" ry="11" transform="rotate(-25 -35 105)"/>
      <ellipse cx="35" cy="105" rx="7" ry="11" transform="rotate(25 35 105)"/>
    </g>

    <!-- Infinity-trunk -->
    <path d="
      M -10 200
      C -60 200, -90 230, -90 260
      C -90 290, -60 320, -10 290
      C 10 280, -10 280, 10 290
      C 60 320, 90 290, 90 260
      C 90 230, 60 200, 10 200
      C -10 210, 10 210, -10 200 Z
    " stroke-width="9"/>
    <path d="M -8 220 C -50 220, -75 245, -75 263 C -75 282, -50 300, -10 278" stroke-width="3" stroke-opacity="0.55"/>
    <path d="M 8 220 C 50 220, 75 245, 75 263 C 75 282, 50 300, 10 278" stroke-width="3" stroke-opacity="0.55"/>

    <!-- Roots -->
    <path d="M0 305 C -2 340, -5 370, -10 395" stroke-width="6"/>
    <path d="M0 305 C 2 340, 5 370, 10 395" stroke-width="6"/>
    <path d="M-8 320 C -25 345, -40 365, -55 380" stroke-width="4"/>
    <path d="M8 320 C 25 345, 40 365, 55 380" stroke-width="4"/>
    <path d="M-12 335 C -35 360, -50 385, -65 400" stroke-width="3"/>
    <path d="M12 335 C 35 360, 50 385, 65 400" stroke-width="3"/>
    <path d="M0 340 C -3 365, -5 385, -3 395" stroke-width="3"/>
    <g fill="url(#logoGrad)" stroke="none">
      <ellipse cx="-12" cy="395" rx="3" ry="5"/>
      <ellipse cx="12" cy="395" rx="3" ry="5"/>
      <ellipse cx="-55" cy="378" rx="3" ry="4"/>
      <ellipse cx="55" cy="378" rx="3" ry="4"/>
      <ellipse cx="-65" cy="398" rx="3" ry="4"/>
      <ellipse cx="65" cy="398" rx="3" ry="4"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="240" y="555"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="72" font-weight="700" letter-spacing="-2"
        fill="#1B2B4A" text-anchor="middle">InfiniTree</text>
</svg>
