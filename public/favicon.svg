<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    InfiniTree favicon — compact glyph that reads cleanly at 16×16.
    Stripped-down version of the brand mark: stylised crown silhouette,
    infinity loop trunk, fanning roots. Single gradient applied to all
    strokes so the icon reads as one continuous form at tiny sizes.
  -->
  <defs>
    <linearGradient id="favGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#3CCB89"/>
      <stop offset="55%" stop-color="#26B5A6"/>
      <stop offset="100%" stop-color="#1A8E96"/>
    </linearGradient>
  </defs>

  <g transform="translate(32 8)" fill="none" stroke="url(#favGrad)"
     stroke-linecap="round" stroke-linejoin="round">

    <!-- Canopy: cluster of leaf-tips -->
    <g fill="url(#favGrad)" stroke="none">
      <ellipse cx="0"   cy="2"  rx="3" ry="5"/>
      <ellipse cx="-7"  cy="4"  rx="3" ry="5" transform="rotate(-25 -7 4)"/>
      <ellipse cx="7"   cy="4"  rx="3" ry="5" transform="rotate(25 7 4)"/>
      <ellipse cx="-12" cy="9"  rx="3" ry="5" transform="rotate(-45 -12 9)"/>
      <ellipse cx="12"  cy="9"  rx="3" ry="5" transform="rotate(45 12 9)"/>
      <ellipse cx="-15" cy="15" rx="3" ry="4" transform="rotate(-65 -15 15)"/>
      <ellipse cx="15"  cy="15" rx="3" ry="4" transform="rotate(65 15 15)"/>
    </g>

    <!-- Center trunk into the infinity -->
    <path d="M0 14 L0 22" stroke-width="2.5"/>

    <!-- Infinity loop -->
    <path d="
      M -3 26
      C -12 26, -16 32, -16 36
      C -16 41, -10 44, -3 40
      C 0 38, -3 38, 3 40
      C 10 44, 16 41, 16 36
      C 16 32, 12 26, 3 26
      C 0 28, 3 28, -3 26 Z
    " stroke-width="2.5"/>

    <!-- Roots -->
    <path d="M0 42 L0 52" stroke-width="1.8"/>
    <path d="M-2 44 C -6 48, -8 51, -10 53" stroke-width="1.5"/>
    <path d="M2 44 C 6 48, 8 51, 10 53" stroke-width="1.5"/>
    <path d="M-1 47 C -3 50, -4 52, -5 53" stroke-width="1.2"/>
    <path d="M1 47 C 3 50, 4 52, 5 53" stroke-width="1.2"/>
  </g>
</svg>
